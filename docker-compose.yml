name: ${COMPOSE_PROJECT_NAME:-vaultshop}

services:
  web:
    image: vaultshop-web:compose
    restart: ${DOCKER_RESTART_POLICY:-unless-stopped}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${APP_ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      Database__RunMigrationsOnStartup: ${DATABASE_RUN_MIGRATIONS_ON_STARTUP:-false}
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection:?ConnectionStrings__DefaultConnection is required}
      Stripe__SecretKey: ${Stripe__SecretKey:?Stripe__SecretKey is required}
      Stripe__PublishableKey: ${Stripe__PublishableKey:?Stripe__PublishableKey is required}
      Stripe__WebhookSecret: ${Stripe__WebhookSecret:?Stripe__WebhookSecret is required}
      Payments__BankTransferEnabled: ${Payments__BankTransferEnabled:-true}
      Payments__StripeEnabled: ${Payments__StripeEnabled:-true}
      Payments__BankTransferCbu: ${Payments__BankTransferCbu:-}
      Payments__BankTransferAlias: ${Payments__BankTransferAlias:-}
      Payments__BankTransferRecipientName: ${Payments__BankTransferRecipientName:-}
      Payments__BankTransferBankName: ${Payments__BankTransferBankName:-}
      Payments__MercadoPagoEnabled: ${Payments__MercadoPagoEnabled:-false}
      Payments__MercadoPagoAccessToken: ${Payments__MercadoPagoAccessToken:-}
      Payments__MercadoPagoWebhookSecret: ${Payments__MercadoPagoWebhookSecret:-}
      Facebook__AppId: ${Facebook__AppId:?Facebook__AppId is required}
      Facebook__AppSecret: ${Facebook__AppSecret:?Facebook__AppSecret is required}
      Email__Provider: ${Email__Provider:-Fake}
      Email__UseFakeEmailSender: ${Email__UseFakeEmailSender:-true}
      Resend__ApiKey: ${Resend__ApiKey:-re_replace_me}
      Resend__FromEmail: ${Resend__FromEmail:-onboarding@resend.dev}
      Seed__AdminEmail: ${Seed__AdminEmail:?Seed__AdminEmail is required when startup initialization is enabled}
      Seed__AdminPassword: ${Seed__AdminPassword:?Seed__AdminPassword is required when startup initialization is enabled}
      SiteUrl: ${SiteUrl:-http://localhost:8080}
      Branding__PublicName: ${Branding__PublicName:-VaultShop}
      Branding__LogoPath: ${Branding__LogoPath:-/images/brand/vaultshop-logo.svg}
      Branding__LogoDarkPath: ${Branding__LogoDarkPath:-/images/brand/vaultshop-logo-dark.svg}
      Branding__MarkPath: ${Branding__MarkPath:-/images/brand/vaultshop-mark.svg}
      Branding__AppleTouchIconPath: ${Branding__AppleTouchIconPath:-/images/brand/vaultshop-mark.svg}
      Branding__SocialPreviewImagePath: ${Branding__SocialPreviewImagePath:-/images/brand/vaultshop-og.svg}
      Branding__TwitterSite: ${Branding__TwitterSite:-@VaultShop}
      Theme__Primary: "${Theme__Primary:-#1a2a4a}"
      Theme__PrimaryDark: "${Theme__PrimaryDark:-#0d1625}"
      Theme__Accent: "${Theme__Accent:-#d4a017}"
      Theme__Surface: "${Theme__Surface:-#f7f8fa}"
      Theme__SurfaceDark: "${Theme__SurfaceDark:-#1e2030}"
      Social__TikTok: ${Social__TikTok:-}
      Social__WhatsApp: ${Social__WhatsApp:-}
      Social__Instagram: ${Social__Instagram:-}
      Social__Facebook: ${Social__Facebook:-}
      Social__DevLink: ${Social__DevLink:-}
      ImageStorage__Provider: ${ImageStorage__Provider:-Local}
      ImageStorage__Minio__Endpoint: ${ImageStorage__Minio__Endpoint:-minio:9000}
      ImageStorage__Minio__UseSsl: ${ImageStorage__Minio__UseSsl:-false}
      ImageStorage__Minio__BucketName: ${ImageStorage__Minio__BucketName:-product-images}
      ImageStorage__Minio__AccessKey: ${ImageStorage__Minio__AccessKey:-${MINIO_ROOT_USER:-minioadmin}}
      ImageStorage__Minio__SecretKey: ${ImageStorage__Minio__SecretKey:-${MINIO_ROOT_PASSWORD:-change-this-local-password}}
      ImageStorage__Minio__PublicBaseUrl: ${ImageStorage__Minio__PublicBaseUrl:-http://localhost:9000/product-images}
    ports:
      - "${APP_HTTP_BIND_IP:-127.0.0.1}:${APP_HTTP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: quay.io/minio/minio:latest
    restart: ${DOCKER_RESTART_POLICY:-unless-stopped}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "${MINIO_BIND_IP:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_BIND_IP:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-product-images}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$MINIO_BUCKET_NAME;
      mc anonymous set download local/$$MINIO_BUCKET_NAME;
      "

  postgres:
    image: postgres:16-alpine
    restart: ${DOCKER_RESTART_POLICY:-unless-stopped}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vaultshop}
      POSTGRES_USER: ${POSTGRES_USER:-vaultshop_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres-data:
  minio-data:
