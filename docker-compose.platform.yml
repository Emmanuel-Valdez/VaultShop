name: vaultshop-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: ${DOCKER_RESTART_POLICY:-unless-stopped}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vaultshop}
      POSTGRES_USER: ${POSTGRES_USER:-vaultshop_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - vaultshop-net

  postgres-init:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:-vaultshop_app}
      UKIYO_POSTGRES_DATABASE: ${UKIYO_POSTGRES_DATABASE:-ukiyostudio}
      UKIYO_POSTGRES_USER: ${UKIYO_POSTGRES_USER:-ukiyostudio_app}
      UKIYO_POSTGRES_PASSWORD: ${UKIYO_POSTGRES_PASSWORD:?UKIYO_POSTGRES_PASSWORD is required}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        psql --host postgres --username "$$POSTGRES_USER" --dbname postgres --set=ON_ERROR_STOP=1 \
          --set=ukiyo_database="$$UKIYO_POSTGRES_DATABASE" \
          --set=ukiyo_user="$$UKIYO_POSTGRES_USER" \
          --set=ukiyo_password="$$UKIYO_POSTGRES_PASSWORD" <<'SQL'
        SELECT format('CREATE ROLE %I LOGIN PASSWORD %L', :'ukiyo_user', :'ukiyo_password')
        WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname = :'ukiyo_user')
        \gexec
        SELECT format('CREATE DATABASE %I OWNER %I', :'ukiyo_database', :'ukiyo_user')
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = :'ukiyo_database')
        \gexec
        SQL
    networks:
      - vaultshop-net

  minio:
    image: quay.io/minio/minio:latest
    restart: ${DOCKER_RESTART_POLICY:-unless-stopped}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - vaultshop-net

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKETS: ${MINIO_BUCKETS:-product-images,ukiyostudio-images}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        for bucket in $$(printf '%s' "$$MINIO_BUCKETS" | tr ',' ' '); do
          mc mb --ignore-existing "local/$$bucket"
          mc anonymous set download "local/$$bucket"
        done
    networks:
      - vaultshop-net

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME:?POSTGRES_VOLUME_NAME is required}
    external: true
  minio-data:
    name: ${MINIO_VOLUME_NAME:?MINIO_VOLUME_NAME is required}
    external: true

networks:
  vaultshop-net:
    name: vaultshop-net
    external: true
